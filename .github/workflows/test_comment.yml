name: Test Comment Flow

on:
  workflow_dispatch:
    inputs:
      post_urn:
        description: 'LinkedIn post URN to comment on (e.g. urn:li:share:xxx)'
        required: true
        default: 'urn:li:share:7444893074100502528'
      post_text:
        description: 'Paste the original post content here (so the AI can write a relevant comment)'
        required: true

jobs:

  # ── Job 1: Generate comment + show full preview ───────────────────
  generate:
    name: Generate Comment Draft
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests flask python-dotenv google-genai

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Generate comment
        run: |
          python - << 'EOF'
          import os
          from dotenv import load_dotenv
          from pathlib import Path

          load_dotenv(".env")

          post_urn   = os.environ["POST_URN"]
          post_text  = os.environ["POST_TEXT"]
          person_urn = os.environ.get("LINKEDIN_PERSON_URN", "")

          from src.content_generator import generate_comment
          comment = generate_comment(post_text)
          print(f"Generated comment:\n{comment}")

          Path("comment_draft.txt").write_text(
              f"POST_URN={post_urn}\n"
              f"PERSON_URN={person_urn}\n"
              f"---POST---\n{post_text}\n"
              f"---COMMENT---\n{comment}\n"
          )
          EOF
        env:
          POST_URN: ${{ inputs.post_urn }}
          POST_TEXT: ${{ inputs.post_text }}

      - name: Write full preview to job summary
        run: |
          python - << 'EOF'
          from pathlib import Path

          content = Path("comment_draft.txt").read_text()
          lines   = content.splitlines()

          post_urn   = next((l.split("=",1)[1] for l in lines if l.startswith("POST_URN=")), "")
          person_urn = next((l.split("=",1)[1] for l in lines if l.startswith("PERSON_URN=")), "")

          post_start    = content.find("---POST---\n") + len("---POST---\n")
          comment_start = content.find("---COMMENT---\n")
          post_text     = content[post_start:comment_start].strip()
          comment_text  = content[comment_start + len("---COMMENT---\n"):].strip()

          summary = f"""# Comment Review

## Posting Account
| Field | Value |
|-------|-------|
| LinkedIn URN | `{person_urn}` |
| Post URN | `{post_urn}` |

---

## Original Post *(this is what was published)*

{post_text}

---

## Proposed Comment *(this will be posted as your comment)*

> {comment_text}

---

✅ **Approve** the next job to post this comment to LinkedIn.
❌ **Reject** to skip — nothing will be posted.
"""
          Path("summary.md").write_text(summary)
          print(summary)
          EOF
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload comment draft
        uses: actions/upload-artifact@v4
        with:
          name: comment-draft
          path: comment_draft.txt
          retention-days: 1

  # ── Job 2: Post comment after your approval ───────────────────────
  post_comment:
    name: Post Comment (pending your approval)
    needs: generate
    runs-on: ubuntu-latest
    environment: comment-approval

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Download comment draft
        uses: actions/download-artifact@v4
        with:
          name: comment-draft

      - name: Post comment to LinkedIn
        run: |
          python - << 'EOF'
          from pathlib import Path
          from src.linkedin_client import create_comment
          from dotenv import load_dotenv

          load_dotenv(".env")

          content    = Path("comment_draft.txt").read_text()
          lines      = content.splitlines()
          post_urn   = next((l.split("=",1)[1] for l in lines if l.startswith("POST_URN=")), "")
          person_urn = next((l.split("=",1)[1] for l in lines if l.startswith("PERSON_URN=")), "")

          start       = content.find("---COMMENT---\n")
          comment_txt = content[start + len("---COMMENT---\n"):].strip()

          print(f"Posting comment to : {post_urn}")
          print(f"As account         : {person_urn}")
          print(f"Comment            : {comment_txt}")
          create_comment(post_urn, comment_txt, person_urn)
          print("Done.")
          EOF
