name: Test Comment Flow

on:
  workflow_dispatch:
    inputs:
      post_urn:
        description: 'LinkedIn post URN to comment on (e.g. urn:li:share:xxx)'
        required: true
        default: 'urn:li:share:7444893074100502528'
      test_topic:
        description: 'Topic for comment generation'
        required: false
        default: 'ai_tips'

jobs:

  # ── Job 1: Generate comment and show for review ───────────────────
  generate:
    name: Generate Comment Draft
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests flask python-dotenv google-genai

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Generate comment
        run: |
          python - << 'EOF'
          import os
          from dotenv import load_dotenv
          from pathlib import Path

          load_dotenv(".env")

          from src.content_generator import generate_comment

          # Use a realistic post sample for generation context
          sample_post = (
              "Most teams debug LLM failures the wrong way.\n\n"
              "They look at the output. They should look at the input.\n\n"
              "When a model gives a bad answer, the root cause is almost always "
              "in how the prompt was constructed — not the model itself.\n\n"
              "Start debugging from the top of your prompt, not the bottom of your logs.\n\n"
              "What's your go-to method for debugging LLM outputs?\n\n"
              "#AITips #LLM #DataEngineering"
          )

          comment = generate_comment(sample_post)
          print(f"Generated comment:\n{comment}")

          post_urn   = os.environ.get("POST_URN", "")
          person_urn = os.environ.get("LINKEDIN_PERSON_URN", "")

          Path("comment_draft.txt").write_text(
              f"POST_URN={post_urn}\nPERSON_URN={person_urn}\n---\n{comment}\n"
          )
          EOF
        env:
          POST_URN: ${{ inputs.post_urn }}

      - name: Write comment to job summary
        run: |
          echo "## Proposed Comment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target post URN:** \`${{ inputs.post_urn }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n +4 comment_draft.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Approve the next job to post this comment, or Reject to skip." >> $GITHUB_STEP_SUMMARY

      - name: Upload comment draft
        uses: actions/upload-artifact@v4
        with:
          name: comment-draft
          path: comment_draft.txt
          retention-days: 1

  # ── Job 2: Post comment after your approval ───────────────────────
  post_comment:
    name: Post Comment (pending your approval)
    needs: generate
    runs-on: ubuntu-latest
    environment: comment-approval   # ← pauses and emails you

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Download comment draft
        uses: actions/download-artifact@v4
        with:
          name: comment-draft

      - name: Post comment to LinkedIn
        run: |
          python - << 'EOF'
          from pathlib import Path
          from src.linkedin_client import create_comment
          from dotenv import load_dotenv

          load_dotenv(".env")

          lines       = Path("comment_draft.txt").read_text().splitlines()
          post_urn    = lines[0].split("=", 1)[1]
          person_urn  = lines[1].split("=", 1)[1]
          comment_txt = "\n".join(lines[3:]).strip()

          print(f"Posting comment to: {post_urn}")
          print(f"Comment text: {comment_txt}")
          create_comment(post_urn, comment_txt, person_urn)
          print("Done.")
          EOF
