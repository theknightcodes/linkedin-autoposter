name: Test Comment Flow

on:
  workflow_dispatch:
    inputs:
      post_urn:
        description: 'LinkedIn post URN to comment on (e.g. urn:li:share:xxx)'
        required: true
        default: 'urn:li:share:7444893074100502528'

jobs:

  # ── Job 1: Fetch post + generate comment + show full preview ──────
  generate:
    name: Generate Comment Draft
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests flask python-dotenv google-genai

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Fetch original post + generate comment
        run: |
          python - << 'EOF'
          import os, requests, json
          from dotenv import load_dotenv
          from pathlib import Path

          load_dotenv(".env")

          post_urn   = os.environ["POST_URN"]
          person_urn = os.environ.get("LINKEDIN_PERSON_URN", "")
          token      = os.environ.get("LINKEDIN_ACCESS_TOKEN", "")

          headers = {
              "Authorization":    f"Bearer {token}",
              "LinkedIn-Version": "202601",
              "X-Restli-Protocol-Version": "2.0.0",
          }

          # ── Fetch original post content from LinkedIn ──────────────
          encoded_urn = requests.utils.quote(post_urn, safe="")
          resp = requests.get(
              f"https://api.linkedin.com/rest/posts/{encoded_urn}",
              headers=headers,
              timeout=15,
          )

          post_text = "(could not fetch post content)"
          if resp.status_code == 200:
              data = resp.json()
              post_text = data.get("commentary", "(no commentary found)")
          else:
              print(f"Warning: could not fetch post [{resp.status_code}]: {resp.text}")

          # ── Fetch account name from LinkedIn ──────────────────────
          profile_resp = requests.get(
              "https://api.linkedin.com/v2/userinfo",
              headers={"Authorization": f"Bearer {token}"},
              timeout=10,
          )
          account_name = "Unknown"
          if profile_resp.status_code == 200:
              profile = profile_resp.json()
              first = profile.get("given_name", "")
              last  = profile.get("family_name", "")
              account_name = f"{first} {last}".strip() or person_urn

          print(f"Account: {account_name}")
          print(f"Post text:\n{post_text}")

          # ── Generate comment ───────────────────────────────────────
          from src.content_generator import generate_comment
          comment = generate_comment(post_text)
          print(f"\nGenerated comment:\n{comment}")

          # ── Save draft with full context ───────────────────────────
          Path("comment_draft.txt").write_text(
              f"POST_URN={post_urn}\n"
              f"PERSON_URN={person_urn}\n"
              f"ACCOUNT_NAME={account_name}\n"
              f"---POST---\n{post_text}\n"
              f"---COMMENT---\n{comment}\n"
          )
          EOF
        env:
          POST_URN: ${{ inputs.post_urn }}

      - name: Write full preview to job summary
        run: |
          python - << 'EOF'
          from pathlib import Path

          content = Path("comment_draft.txt").read_text()

          def extract(content, start_marker, end_marker=None):
              start = content.find(start_marker)
              if start == -1:
                  return ""
              start += len(start_marker)
              if end_marker:
                  end = content.find(end_marker, start)
                  return content[start:end].strip() if end != -1 else content[start:].strip()
              return content[start:].strip()

          lines        = content.splitlines()
          post_urn     = next((l.split("=",1)[1] for l in lines if l.startswith("POST_URN=")), "")
          person_urn   = next((l.split("=",1)[1] for l in lines if l.startswith("PERSON_URN=")), "")
          account_name = next((l.split("=",1)[1] for l in lines if l.startswith("ACCOUNT_NAME=")), "")
          post_text    = extract(content, "---POST---\n", "---COMMENT---")
          comment_text = extract(content, "---COMMENT---\n")

          summary = f"""# Comment Review

          ## Posting Account
          | Field | Value |
          |-------|-------|
          | Name | **{account_name}** |
          | URN | `{person_urn}` |

          ---

          ## Original Post
          > {chr(10).join('> ' + line for line in post_text.splitlines())}

          ---

          ## Proposed Comment
          > {chr(10).join('> ' + line for line in comment_text.splitlines())}

          ---

          **Approve** the next job to post this comment, or **Reject** to skip.
          """

          # Dedent
          summary = "\n".join(line.lstrip() for line in summary.splitlines())
          Path("summary.md").write_text(summary)
          print(summary)
          EOF
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload comment draft
        uses: actions/upload-artifact@v4
        with:
          name: comment-draft
          path: comment_draft.txt
          retention-days: 1

  # ── Job 2: Post comment after your approval ───────────────────────
  post_comment:
    name: Post Comment (pending your approval)
    needs: generate
    runs-on: ubuntu-latest
    environment: comment-approval

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Download comment draft
        uses: actions/download-artifact@v4
        with:
          name: comment-draft

      - name: Post comment to LinkedIn
        run: |
          python - << 'EOF'
          from pathlib import Path
          from src.linkedin_client import create_comment
          from dotenv import load_dotenv

          load_dotenv(".env")

          content    = Path("comment_draft.txt").read_text()
          lines      = content.splitlines()
          post_urn   = next((l.split("=",1)[1] for l in lines if l.startswith("POST_URN=")), "")
          person_urn = next((l.split("=",1)[1] for l in lines if l.startswith("PERSON_URN=")), "")

          start = content.find("---COMMENT---\n")
          comment_txt = content[start + len("---COMMENT---\n"):].strip()

          print(f"Posting comment to: {post_urn}")
          print(f"Comment: {comment_txt}")
          create_comment(post_urn, comment_txt, person_urn)
          print("Done.")
          EOF
