name: LinkedIn Post

on:
  schedule:
    - cron: '30 0 * * 2,4'   # 08:30 SGT = 00:30 UTC — Tuesday & Thursday only
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:

  post:
    name: Post to LinkedIn
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install anthropic requests flask python-dotenv google-genai "openai>=1.30.0" "Pillow>=10.4.0"

      - name: Install Remotion dependencies
        run: npm ci
        working-directory: remotion

      - name: Write .env from secrets
        # Using env: block + printf prevents heredoc newline-in-secret corruption
        env:
          LLM_PROVIDER:               ${{ secrets.LLM_PROVIDER }}
          OPENROUTER_API_KEY:         ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:           ${{ secrets.OPENROUTER_MODEL }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID:         ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET:     ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN:      ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN:     ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT:  ${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT: ${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN:        ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          printf 'LLM_PROVIDER=%s\n'               "$LLM_PROVIDER"               >> .env
          printf 'OPENROUTER_API_KEY=%s\n'         "$OPENROUTER_API_KEY"         >> .env
          printf 'OPENROUTER_MODEL=%s\n'           "$OPENROUTER_MODEL"           >> .env
          printf 'GEMINI_API_KEY=%s\n'             "$GEMINI_API_KEY"             >> .env
          printf 'ANTHROPIC_API_KEY=%s\n'          "$ANTHROPIC_API_KEY"          >> .env
          printf 'LINKEDIN_CLIENT_ID=%s\n'         "$LINKEDIN_CLIENT_ID"         >> .env
          printf 'LINKEDIN_CLIENT_SECRET=%s\n'     "$LINKEDIN_CLIENT_SECRET"     >> .env
          printf 'LINKEDIN_ACCESS_TOKEN=%s\n'      "$LINKEDIN_ACCESS_TOKEN"      >> .env
          printf 'LINKEDIN_REFRESH_TOKEN=%s\n'     "$LINKEDIN_REFRESH_TOKEN"     >> .env
          printf 'LINKEDIN_TOKEN_EXPIRES_AT=%s\n'  "$LINKEDIN_TOKEN_EXPIRES_AT"  >> .env
          printf 'LINKEDIN_REFRESH_ISSUED_AT=%s\n' "$LINKEDIN_REFRESH_ISSUED_AT" >> .env
          printf 'LINKEDIN_PERSON_URN=%s\n'        "$LINKEDIN_PERSON_URN"        >> .env
          printf 'DRY_RUN=false\n'                                               >> .env
          printf 'ENABLE_IMAGES=true\n'                                          >> .env
          printf 'ENABLE_AI_IMAGES=false\n'                                      >> .env

      - name: Restore post history
        uses: actions/cache@v4
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}
          restore-keys: posts-db-

      - name: Post to LinkedIn
        run: python -m src.main

      - name: Save post history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}
