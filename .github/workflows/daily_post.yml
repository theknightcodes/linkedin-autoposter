name: Daily LinkedIn Post

on:
  schedule:
    - cron: '30 0 * * *'   # 08:30 SGT = 00:30 UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:

  post:
    name: Post to LinkedIn
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests flask python-dotenv google-genai

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          DRY_RUN=false
          EOF

      - name: Restore post history
        uses: actions/cache@v4
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}
          restore-keys: posts-db-

      - name: Post to LinkedIn
        run: python -m src.main

      - name: Save post history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}
